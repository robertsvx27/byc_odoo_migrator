# Migration rules from Odoo 16.0 to 17.0

version:
  from_version: '16.0'
  to_version: '17.0'

python_patterns:
  - id: "models_import"
    pattern: "from odoo.addons.base.models import ir_model"
    replacement: "from odoo.addons.base.models import ir_model"
    description: "Update model imports"
    enabled: true
    use_regex: false

xml_patterns:
  - id: "action_view"
    pattern: 'type="ir.actions.act_window"'
    replacement: 'type="ir.actions.act_window"'
    description: "Update action view definitions"
    enabled: true
    use_regex: false
  - id: "delete_widget1"
    pattern: 'widget="mail_followers"'
    replacement: ''
    description: ""
    enabled: true
    use_regex: false
  - id: "delete_widget2"
    pattern: 'widget="mail_activity"'
    replacement: ''
    action: 'replace'
    description: ""
    enabled: true
    use_regex: false
  - id: "delete_widget3"
    pattern: 'widget="mail_thread"'
    replacement: ''
    description: ""
    action: 'replace'
    enabled: true
    use_regex: false
  - id: "delete_tag"
    pattern: 'menuitem,string'
    replacement: ''
    description: ""
    action: 'delete_attr'
    enabled: true
    use_regex: true
  - id: "format_tree_state"
    pattern: 'tree_state_prop'
    replacement: ''
    description: ""
    action: 'format_view_170'
    enabled: true
    use_regex: true
js_patterns: []
