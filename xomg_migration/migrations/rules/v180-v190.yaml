# Migration rules from Odoo 18.0 to 19.0

version:
  from_version: '18.0'
  to_version: '19.0'

python_patterns:
  - id: "osv_expression"
    pattern: 'from odoo.osv import expression'
    replacement: "from odoo.fields import Domain"
    description: "Update osv.expression to Domain"
    enabled: true
    use_regex: false
  - id: "osv_expression_fields"
    pattern: 'expression.'
    replacement: "Domain."
    description: "Update expression.constant to Domain.Constant"
    enabled: true
    use_regex: false
  - id: "osv_exp_spec_field"
    pattern: 'Domain.NEGATIVE_TERM_OPERATORS'
    replacement: "Domain.NEGATIVE_OPERATORS"
    description: "Update Domain.constant"
    enabled: true
    use_regex: false
  - id: "rename_groups_id"
    pattern: (?<=[\.\"'])groups_id(?=[\.\s,:)\]'\"])
    replacement: 'group_ids'
    description: "rename groups_id to groups_id"
    enabled: true
    use_regex: true
  - id: "rename_hr_contract"
    pattern: "hr.contract"
    replacement: 'group_ids'
    description: "rename groups_id to groups_id"
    enabled: true
    use_regex: false
  - id: "rename_field_tax"
    pattern: "importe_gift_card"
    replacement: 'amount_giftcard_payment'
    description: "rename field"
    enabled: true
    use_regex: false
  - id: "rename_field_tax"
    pattern: "amount_giftcard"
    replacement: 'amount_giftcard_payment'
    description: "rename field"
    enabled: false
    use_regex: false
  - id: "rename_field_tax"
    pattern: "importe_iht"
    replacement: 'amount_tax_iht'
    description: "rename field"
    enabled: true
    use_regex: false
  - id: "rename_field_tax"
    pattern: "importe_exento"
    replacement: 'amount_tax_exempt'
    description: "rename field"
    enabled: true
    use_regex: false
  - id: "rename_field_tax"
    pattern: "importe_vgc"
    replacement: 'amount_tax_zero'
    description: "rename field"
    enabled: true
    use_regex: false
  - id: "rename_field_tax"
    pattern: "importe_ncf"
    replacement: 'amount_tax_nocredit'
    description: "rename field"
    enabled: true
    use_regex: false
  - id: "rename_field_tax"
    pattern: "importe_dscto"
    replacement: 'amount_total_discount'
    description: "rename field"
    enabled: true
    use_regex: false
  - id: "rename_field_tax"
    pattern: "importe_iht"
    replacement: 'amount_tax_iht'
    description: "rename field"
    enabled: true
    use_regex: false
  - id: "rename_field_tax"
    pattern: "importe_ice"
    replacement: 'amount_tax_ice'
    description: "rename field"
    enabled: true
    use_regex: false
  - id: "rename_field_tax"
    pattern: "importe_tasas"
    replacement: 'amount_tax_rate'
    description: "rename field"
    enabled: true
    use_regex: false
  - id: "rename_field_tax"
    pattern: "importe_ipj"
    replacement: 'amount_tax_ipj'
    description: "rename field"
    enabled: true
    use_regex: false
  - id: "rename_field_tax"
    pattern: "importe_base"
    replacement: 'amount_tax_base'
    description: "rename field"
    enabled: true
    use_regex: false
  - id: "rename_field_tax1"
    pattern: "tipo_compra_id"
    replacement: 'purchase_tax_type_id'
    description: "rename field"
    enabled: true
    use_regex: false
  - id: "rename_field_tax2"
    pattern: "tipo_venta_id"
    replacement: 'sale_tax_type_id'
    description: "rename field"
    enabled: true
    use_regex: false
xml_patterns:
  - id: "rename_groups_id"
    pattern: (?<=name=[\"'])groups_id(?=[\"'])
    replacement: 'group_ids'
    description: "rename groups_id to groups_id"
    enabled: true
    use_regex: true
  - id: "rename_payment_state"
    pattern: ([\"']account\.payment[\"'].*)(\('state'.*'posted'\))
    replacement: "\\1('state','=','paid')"
    description: "rename_payment_state"
    enabled: true
    use_regex: true
  - id: "rename_field_tax"
    pattern: (<field[\s\S]*?name=["\'])(importe_iht)(["\'])([\s\S]*?/>)
    replacement: "\\1amount_tax_iht\\3/>"
    description: "rename field"
    enabled: true
    use_regex: true
