# Migration rules from Odoo 15.0 to 16.0

version:
  from_version: '15.0'
  to_version: '16.0'

python_patterns: []
xml_patterns:
  - id: "record_id"
    pattern: '<record id="'
    replacement: '<record id="'
    description: "Update record definitions"
    enabled: false
    use_regex: false

js_patterns: []
