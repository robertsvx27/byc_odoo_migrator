# migrations/rules/v14-v15.yaml
version:
  from_version: "14.0"
  to_version: "15.0"
  breaking: true

python_patterns:
  - id: "api_onchange_rename"
    pattern: '@api\.onchange\((.+?)\)'
    replacement: '@onchange(\1)'
    description: "Rename api.onchange to onchange"
    enabled: true
    use_regex: false

  - id: "html_escape"
    pattern: "from openerp.tools import html_escape"
    replacement: "from markupsafe import escape as html_escape"
    description: "html_escape moved to markupsafe"
    enabled: true
    use_regex: false

  - id: "env_removal"
    pattern: 'self\.env\.cr\.execute\('
    replacement: 'self.env.execute_sql('
    files_match: "*.py"
    enabled: true
    use_regex: false

xml_patterns:
  - id: "field_widget_update"
    pattern: '<field.*widget="many2many_tags"'
    replacement: '<field widget="many2many_tags_char"'

  - id: "field_domain"
    pattern: 'domain=\"\['
    replacement: 'domain="['
    description: "Update XML domain format"
    enabled: false
    use_regex: false

javascript_patterns:
  - id: "odoo_define_update"
    pattern: "odoo\\.define\\("
    replacement: "define("

sql_patterns:
  - id: "table_rename"
    pattern: "ALTER TABLE sale_order RENAME TO sale_order_backup;"
    description: "Backup of old sale_order table structure"