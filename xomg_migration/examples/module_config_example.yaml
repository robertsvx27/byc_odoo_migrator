# Example: Module Configuration

# Configure specific module migration settings

module:
  name: 'sale_custom'
  version: '14.0'
  target_version: '19.0'
  author: 'BYC Software'

files_to_migrate:
  - 'models/*.py'
  - 'views/*.xml'
  - 'static/**/*.js'
  - 'static/**/*.css'

exclude_patterns:
  - '**/__pycache__/**'
  - '**/.git/**'
  - '**/node_modules/**'
  - '**/*.pyc'

migration_settings:
  create_backup: true
  validate_syntax: true
  run_tests: true
  generate_report: true

custom_rules:
  - file: 'custom_v14_v15_rules.yaml'
  - file: 'custom_v15_v16_rules.yaml'
