# Odoo Migration Configuration

# Default migration settings
defaults:
  target_version: '17.0'
  auto_backup: true
  backup_dir: '../../x_tasks/backups'
  report_dir: '../../x_tasks/migration_reports'
  validate_after_migration: true
  custom_rules_dir: '../../x_tasks/rules'

# Supported Odoo versions
supported_versions:
  - '13.0'
  - '14.0'
  - '15.0'
  - '16.0'
  - '17.0'
  - '18.0'
  - '19.0'

# Code analysis settings
code_analysis:
  check_syntax: true
  check_imports: true
  check_deprecated_apis: true
  max_line_length: 120

# Logging configuration
logging:
  level: 'INFO'
  file: 'migration.log'
  max_size_mb: 10
  backup_count: 5
